name: Build & Deploy

on:
  push:
    branches: [main]
  # ✅ Manual run button in GitHub Actions
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy?"
        type: choice
        required: true
        default: both
        options:
          - both
          - server
          - app

# Allow pushing to branches (server/web)
permissions:
  contents: write

# Cancel previous runs if a new one is triggered
concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Test & Deploy Server
  # - Runs on:
  #   - push to main
  #   - manual dispatch when target is server or both
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-server:
    name: Deploy Server
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'server' || inputs.target == 'both'))

    # Add PostgreSQL service for tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "123456"
          POSTGRES_DB: myrecipes_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run server tests
        working-directory: server
        run: npm run test:all
        env:
          # Test database credentials (strings must be quoted!)
          # ⚠️ IMPORTANT: database.js expects DB_PASS, not DB_PASSWORD!
          DB_USER: postgres
          DB_PASS: "123456"
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: myrecipes_test
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_key_for_ci_testing_only_32chars

      - name: Push to server branch
        run: |
          set -euo pipefail
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"

          # 1️⃣ Save production files to temp
          # ⚠️ Server is JavaScript (no build needed), deploy source directly
          mkdir -p /tmp/server-deploy
          # Copy server files using rsync (excludes test files, dev tools, and build artifacts)
          rsync -r \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=tests \
            --exclude=coverage \
            --exclude=.eslintcache \
            --exclude='*.log' \
            --exclude='.prettierrc*' \
            --exclude='.prettierignore' \
            server/ /tmp/server-deploy/
          printf 'web: node app.js\n' > /tmp/server-deploy/Procfile

          # Remove test/dev/format scripts and devDependencies for production
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('/tmp/server-deploy/package.json'));
            delete p.scripts.dev;
            delete p.scripts['test'];
            delete p.scripts['test:all'];
            delete p.scripts['test:comprehensive'];
            delete p.scripts['test:integration'];
            delete p.scripts['test:e2e'];
            delete p.scripts['test:storage'];
            delete p.scripts['format'];
            delete p.scripts['format:check'];
            delete p.devDependencies;
            fs.writeFileSync('/tmp/server-deploy/package.json', JSON.stringify(p, null, 2));
          "

          # 2️⃣ Create clean orphan branch
          git checkout --orphan server-new-clean
          git rm -rf . --cached 2>/dev/null || true

          # 3️⃣ DELETE everything from disk (BUT KEEP .git)
          find . -maxdepth 1 ! -name '.' ! -name '.git' -exec rm -rf {} + 2>/dev/null || true

          # 4️⃣ Restore ONLY production files
          cp -r /tmp/server-deploy/* .

          # 5️⃣ Commit and merge
          git add -A
          if [ -z "$(git diff --cached --name-only)" ]; then
            echo "⏭️  No changes to deploy (server)"
            exit 0
          fi

          git commit -m "deploy(server): $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git branch -M server-new-clean server
          git push origin server --force

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Test & Deploy App (Ionic React)
  # - Runs on:
  #   - push to main
  #   - manual dispatch when target is app or both
  # - Deploys to 'web' branch for web deployment (GitHub Pages, Netlify, Vercel)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-app:
    name: Deploy App
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'app' || inputs.target == 'both'))

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Run app tests
        working-directory: app
        run: npm test

      - name: Build app
        working-directory: app
        run: npm run build
        env:
          # ⚠️ CRITICAL: These must be set in GitHub repo → Settings → Secrets and variables → Actions → Variables tab
          # If empty, app will fail to load on GitHub Pages (404 errors on assets)
          # VITE_API_URL: Your production API URL (e.g., https://api.herokuapp.com)
          # VITE_BASE_URL: /mobile-recipes-e1/ for GitHub Pages (MUST include trailing slash!)
          VITE_API_URL: ${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || 'http://localhost:3000' }}
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL != '' && vars.VITE_BASE_URL || '/mobile-recipes-e1/' }}

      - name: Verify dist folder
        run: |
          set -euo pipefail
          if [ ! -d "app/dist" ]; then
            echo "❌ Build failed: app/dist not found"
            exit 1
          fi
          echo "✅ App build successful:"
          du -sh app/dist
          find app/dist -type f | wc -l

      - name: Publish to web branch (for GitHub Pages / Netlify / Vercel)
        run: |
          set -euo pipefail
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"

          # 1️⃣ Save dist files to temp
          mkdir -p /tmp/web-deploy
          cp -r app/dist/* /tmp/web-deploy/
          # Add .nojekyll to prevent GitHub Pages from ignoring underscore folders
          touch /tmp/web-deploy/.nojekyll

          # 2️⃣ Create clean orphan branch
          git checkout --orphan web-new-clean
          git rm -rf . --cached 2>/dev/null || true

          # 3️⃣ DELETE everything from disk (BUT KEEP .git)
          find . -maxdepth 1 ! -name '.' ! -name '.git' -exec rm -rf {} + 2>/dev/null || true

          # 4️⃣ Restore ONLY dist files
          cp -r /tmp/web-deploy/* .

          # 5️⃣ Commit and merge
          git add -A
          if [ -z "$(git diff --cached --name-only)" ]; then
            echo "⏭️  No changes to deploy (web)"
            exit 0
          fi

          git commit -m "deploy(web): $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git branch -M web-new-clean web
          git push origin web --force
