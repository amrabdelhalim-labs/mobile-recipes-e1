name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual run button in GitHub Actions
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy?"
        type: choice
        required: true
        default: both
        options:
          - both
          - server
          - app

# Allow pushing to deployment branches (server/web)
permissions:
  contents: write

# Avoid concurrent deployments stomping each other
concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Deploy Server
  # Pure JavaScript server - no build step required
  # Copies the entire server/ folder directly to the server branch
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-server:
    name: Deploy Server
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'server' || inputs.target == 'both'))

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Push to server branch
        run: |
          set -euo pipefail
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"

          # 1️⃣ Save server files to temp (no build step - pure JS runs directly)
          mkdir -p /tmp/server-deploy
          cp -r server/. /tmp/server-deploy/

          # 2️⃣ Create clean orphan branch
          git checkout --orphan server-new-clean
          git rm -rf . --cached 2>/dev/null || true

          # 3️⃣ DELETE everything from disk (BUT KEEP .git)
          find . -maxdepth 1 ! -name '.' ! -name '.git' -exec rm -rf {} + 2>/dev/null || true

          # 4️⃣ Restore ONLY server files
          cp -r /tmp/server-deploy/. .

          # 5️⃣ Commit and push
          git add -A
          if [ -z "$(git diff --cached --name-only)" ]; then
            echo "⏭️  No changes to deploy (server)"
            exit 0
          fi

          git commit -m "deploy(server): $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git branch -M server-new-clean server
          git push origin server --force

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy App
  # Ionic/React app - builds with Vite then deploys dist/ to web branch
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-app:
    name: Deploy App
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'app' || inputs.target == 'both'))

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build app
        working-directory: app
        run: npm run build
        env:
          # Add these secrets in: GitHub repo → Settings → Secrets → Actions
          VITE_API_URL:  ${{ secrets.VITE_API_URL }}
          # Base path: /mobile-recipes-e1/ for GitHub Pages, / for other platforms
          # Auto-detected via GITHUB_ACTIONS env var if not set (see vite.config.ts)
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}

      - name: Verify dist folder
        run: |
          set -euo pipefail
          if [ ! -d "app/dist" ]; then
            echo "❌ Build failed: app/dist not found"
            exit 1
          fi
          echo "✅ App build successful:"
          du -sh app/dist
          find app/dist -type f | wc -l

      - name: Publish to web branch (clean orphan)
        run: |
          set -euo pipefail
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"

          # 1️⃣ Save dist files to temp + add .nojekyll for GitHub Pages
          mkdir -p /tmp/app-deploy
          cp -r app/dist/. /tmp/app-deploy/
          touch /tmp/app-deploy/.nojekyll

          # 2️⃣ Create clean orphan branch
          git checkout --orphan web-new-clean
          git rm -rf . --cached 2>/dev/null || true

          # 3️⃣ DELETE everything from disk (BUT KEEP .git)
          find . -maxdepth 1 ! -name '.' ! -name '.git' -exec rm -rf {} + 2>/dev/null || true

          # 4️⃣ Restore ONLY dist files (cp -r src/. copies hidden files too)
          cp -r /tmp/app-deploy/. .

          # 5️⃣ Commit and push
          git add -A
          if [ -z "$(git diff --cached --name-only)" ]; then
            echo "⏭️  No changes to deploy (app)"
            exit 0
          fi

          git commit -m "deploy(app): $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git branch -M web-new-clean web
          git push origin web --force

