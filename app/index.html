<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>وصفاتي</title>
    
    <!-- base tag is handled by Vite config -->

    <!-- ================================================================
         GitHub Pages SPA redirect receiver
         Decodes the path encoded by 404.html and restores it via history API
         Based on: https://github.com/rafgraph/spa-github-pages
         ================================================================ -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&'); });
          // Preserve the repo-name base path (e.g. /mobile-recipes-e1)
          var basePath = l.pathname.split('/').slice(0, 2).join('/');
          window.history.replaceState(
            null, null,
            basePath + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
    
    <meta name="color-scheme" content="light dark" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <link rel="manifest" href="manifest.json" />
    
    <link rel="shortcut icon" type="image/png" href="favicon.png" />
    
    <!-- add to homescreen for ios -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ionic App" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
